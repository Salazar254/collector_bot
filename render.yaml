# render.yaml — Render Blueprint for collector_bot v2
# Snapshot-based data collection at T0, T0+1m, T0+5m, T0+15m.
# Auto-deploys on git push to main branch.

services:
  - type: web
    name: collector-bot
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.lock
    startCommand: python scripts/collect_service.py
    envVars:
      - key: HELIUS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: COLLECTION_INTERVAL_SECONDS
        value: "10"
      - key: QUALITY_CHECK_INTERVAL
        value: "100"
      - key: PORT
        value: "10000"
